name: Leatherfolio
options:
  bundleIdPrefix: com.robbybarnes
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
targets:
  Leatherfolio:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Leatherfolio
        excludes:
          - "Resources/**"
      - path: Leatherfolio/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.robbybarnes.leatherfolio
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
    info:
      path: Leatherfolio/Info.plist
      properties:
        CFBundleDisplayName: My PLG Collection
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Leatherfolio uses the camera to photograph your items and, later, to scan QR and barcode labels."
        NSPhotoLibraryUsageDescription: "Leatherfolio lets you pick photos of your items from your photo library."
        CFBundleURLTypes:
          - CFBundleURLName: com.robbybarnes.leatherfolio
            CFBundleURLSchemes:
              - leatherfolio
  LeatherfolioTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - LeatherfolioTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Leatherfolio
schemes:
  Leatherfolio:
    build:
      targets:
        Leatherfolio: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LeatherfolioTests
